
<html>
    <head>
        <title>Login Page</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="css/estilos.css" rel="stylesheet" type="text/css"/>
    </head>
    <body>
        
        <div class="container"> 
            <div class="container-form"> 
                <form class="sign-in">
                    <h2>Iniciar Sesión</h2>
                    <div class="social-networks">
                      <a href="https://accounts.google.com/v3/signin/identifier?authuser=0&continue=https%3A%2F%2Fwww.google.com%2F&ec=futura_exp_og_si_72776762_e&hl=es-419&flowName=GlifWebSignIn&flowEntry=AddSession&dsh=S138157012%3A1776572787511910 " target="_blank">
                        <ion-icon name="logo-google"></ion-icon>
                      </a>
                      <a href="https://instagram.com/tu_usuario" target="_blank"> 
                        <ion-icon name="logo-instagram"></ion-icon>
                      </a>
                      <a href="https://facebook.com/tu_pagina" target="_blank">
                        <ion-icon name="logo-facebook"></ion-icon>
                      </a>
                      <a href="https://tiktok.com/@tu_usuario" target="_blank">
                        <ion-icon name="logo-tiktok"></ion-icon>
                      </a>
                    </div>
                    <span>Use su correo y contraseña</span>
                    <div class="container-input">
                        <ion-icon name="mail-outline"></ion-icon>
                        <input type="text" placeholder="Email" required>
                    </div>
                    <div class="container-input">
                        <ion-icon name="lock-closed-outline"></ion-icon>
                        <input type="password" placeholder="Password" required>
                    </div>
                    <a href="#">¿Olvidaste tu contraseña?</a>
                    <button class="button" >INICIAR SESIÓN</button>
                </form>
            </div>
            
            
            <div class="container-form">
                <form class="sign-up">
                    <h2>Registrarse</h2>
                    <div class="social-networks">
                      <a href="https://accounts.google.com/v3/signin/identifier?authuser=0&continue=https%3A%2F%2Fwww.google.com%2F&ec=futura_exp_og_si_72776762_e&hl=es-419&flowName=GlifWebSignIn&flowEntry=AddSession&dsh=S138157012%3A1776572787511910 " target="_blank">
                        <ion-icon name="logo-google"></ion-icon>
                      </a>
                      <a href="https://instagram.com/tu_usuario" target="_blank"> 
                        <ion-icon name="logo-instagram"></ion-icon>
                      </a>
                      <a href="https://facebook.com/tu_pagina" target="_blank">
                        <ion-icon name="logo-facebook"></ion-icon>
                      </a>
                      <a href="https://tiktok.com/@tu_usuario" target="_blank">
                        <ion-icon name="logo-tiktok"></ion-icon>
                      </a>
                    </div>
                    <span>Use su correo electrónico para registrarse</span>
                    <div class="container-input">
                        <ion-icon name="person-outline"></ion-icon>
                        <input type="text" placeholder="Nombre" required>
                    </div>
                    <div class="container-input">
                        <ion-icon name="mail-outline"></ion-icon>
                        <input type="text" placeholder="Email" required>
                    </div>
                    <div class="container-input">
                        <ion-icon name="lock-closed-outline"></ion-icon>
                        <input type="password" placeholder="Password" required>
                    </div>
                    <button class="button" >REGISTRARSE</button>
                </form>
            </div>
            
            <div class="container-welcome">
                <div class="welcome-sign-up welcome">
                    <h3>¡Bienvenido!</h3>
                    <p>Ingrese sus datos personales para usar todas las funciones del sitio </p>
                    <button class="button" id="btn-sign-up">Registrarse</button>
                </div>
                <div class="welcome-sign-in welcome">
                    <h3>¡Hola!</h3>
                    <p>Regístrese con sus datos personales para usar todas las funciones del sitio </p>
                    <button class="button" id="btn-sign-in">Iniciar Sesión</button>
                </div>
                
            </div>
            
        </div>
        
        <script src="script.js" type="text/javascript"></script>
        <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
        <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    </body>
</html>
