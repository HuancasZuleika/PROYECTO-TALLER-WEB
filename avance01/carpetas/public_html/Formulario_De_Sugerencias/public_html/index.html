<!DOCTYPE html>
<html lang="es">

<head>

    <title>Urban Athletics - Sugerencias</title>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/estilos.css">

</head>

<body>

    <div class="contenedor">

        <div class="info">

            <img src="imagenes/logo.png"
                 alt="Logo Urban Athletics"
                 class="logo">

            <h2>Contáctanos</h2>

            <p>
                <a href="https://www.google.com/maps?q=Abancay+627+Lima+Peru"
                   target="_blank">
                    📍 Abancay 627, Lima
                </a>
            </p>

            <p>
                <a href="https://wa.me/51987654321"
                   target="_blank">
                    📞 987654321
                </a>
            </p>

            <p>
                <a href="mailto:urban@gmail.com">
                    📧 urban@gmail.com
                </a>
            </p>

        </div>

        <div class="formulario">

            <h2>Sugerencias</h2>

            <form id="formSugerencia">

                <input type="text"
                       id="nombre"
                       placeholder="Nombre"
                       required>

                <input type="email"
                       id="email"
                       placeholder="Correo electrónico"
                       required>

                <textarea id="mensaje"
                          placeholder="Escribe tu sugerencia..."
                          required></textarea>

                <button type="submit">
                    Enviar
                </button>

            </form>

            <p id="respuesta"></p>

            <p id="contador"></p>

        </div>

    </div>

    <!-- MODAL -->

    <div id="modal" class="modal">

        <div class="modal-contenido">

            <h2 id="modalTitulo"></h2>

            <p id="modalMensaje"></p>

            <div id="modalBotones">

                <button id="btnCancelar">
                    Cancelar
                </button>

                <button id="btnAceptar">
                    Aceptar
                </button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
