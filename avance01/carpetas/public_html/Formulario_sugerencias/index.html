<html lang="es">
<head>
    <title>Urban Athletics - Sugerencias</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

<div class="contenedor">

    <!-- LADO IZQUIERDO -->
    <div class="info">

        <img src="imagenes/logo.png" alt="Logo Urban Athletics" class="logo"/>

        <h2>Contáctanos</h2>
        <p>📍 Lima, Perú</p>
        <p>📞 987654321</p>
        <p>📧 urban@gmail.com</p>
    </div>

    <!-- FORMULARIO -->
    <div class="formulario">
        <h2>Sugerencias</h2>

        <form id="formSugerencia">
            <input type="text" id="nombre" placeholder="Nombre" required>
            <input type="email" id="email" placeholder="Email" required>
            <textarea id="mensaje" placeholder="Escribe tu sugerencia..." required></textarea>

            <button type="submit">Enviar</button>
        </form>

        <p id="respuesta"></p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
